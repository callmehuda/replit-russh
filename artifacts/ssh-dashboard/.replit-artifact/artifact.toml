kind = "web"
previewPath = "/"
title = "SSH-over-WebSocket Dashboard"
version = "1.0.0"
id = "artifacts/ssh-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22769

[services.development]
run = "pnpm --filter @workspace/ssh-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ssh-dashboard", "run", "build" ]
publicDir = "artifacts/ssh-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22769"
BASE_PATH = "/"
